<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f5f3ee" />
    <title>恩典法律事務所 AI 工作台</title>
    <link rel="stylesheet" href="./web/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">恩</div>
          <div>
            <strong>恩典法律事務所</strong>
            <span>AI 工作台 · 模擬環境</span>
          </div>
        </div>
        <div class="topbar-actions">
          <span class="status-dot"><i></i>本機資料</span>
          <button class="icon-button" id="reset-demo" title="重設展示" aria-label="重設展示">↻</button>
        </div>
      </header>

      <aside class="sidebar" aria-label="主要導覽">
        <nav id="main-nav">
          <button class="nav-item active" data-view="overview">
            <span class="nav-icon">⌂</span><span>今日總覽</span>
          </button>
          <button class="nav-item" data-view="radar">
            <span class="nav-icon">◎</span><span>法律雷達</span><b>4</b>
          </button>
          <button class="nav-item" data-view="line">
            <span class="nav-icon">↗</span><span>LINE 排程</span><b>1</b>
          </button>
          <button class="nav-item" data-view="hours">
            <span class="nav-icon">◷</span><span>服務時數</span><b>2</b>
          </button>
          <button class="nav-item" data-view="billing">
            <span class="nav-icon">▤</span><span>帳單草稿</span><b>2</b>
          </button>
        </nav>
        <div class="principle">
          <span>工作原則</span>
          <strong>AI 先整理<br />人再決定</strong>
        </div>
      </aside>

      <main id="app-content" tabindex="-1"></main>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script type="module" src="./web/app.js"></script>
  </body>
</html>
